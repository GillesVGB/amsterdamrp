[build]
  base = "."
  command = "npm run build"
  publish = "outputs"

[[redirects]]
  from = "/api/status"
  to = "/.netlify/functions/status"
  status = 200

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/apv"
  to = "/regels.html"
  status = 301

[[redirects]]
  from = "/status"
  to = "/status.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
